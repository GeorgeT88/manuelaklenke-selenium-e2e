name: Selenium E2E Tests

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && 'Selenium E2E Tests — manual run' ||
  github.event_name == 'repository_dispatch' && 'Selenium E2E Tests — triggered by Vercel deploy' ||
  github.event_name == 'schedule' && 'Selenium E2E Tests — nightly run' ||
  'Selenium E2E Tests' }}

on:
  repository_dispatch:
    types: [vercel-deploy]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

jobs:
  test:
    name: Selenium E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium E2E tests
        run: npm test
        env:
          SE_BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Write test results summary
        if: always()
        run: |
          echo "## Selenium E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://manuelaklenke.com" >> $GITHUB_STEP_SUMMARY
          echo "**Browser:** Chrome (headless)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
